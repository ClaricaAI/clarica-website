topic: "Clarica Website Content Strategy — AI Agency for UK Social Care"

fields:

  # ========================================
  # PAIN POINTS (Category A)
  # ========================================
  pain_points:
    - name: severity_ranking
      description: "How frequently cited in surveys, reports, and sector literature. Rank relative to other pain points."
      detail_level: moderate

    - name: audience_affected
      description: "Which roles feel this most — CEO/owner, operations director, registered manager, compliance manager, frontline staff."
      detail_level: moderate

    - name: financial_impact
      description: "Estimated cost to the organisation — direct costs, lost productivity, fines, agency spend."
      detail_level: detailed

    - name: emotional_trigger
      description: "The exact language care professionals use to describe this pain. Quotes from forums, surveys, reports."
      detail_level: detailed

    - name: ai_solvability
      description: "How directly AI can address this pain point — fully automatable, partially, or requires human-AI collaboration."
      detail_level: moderate

    - name: source_evidence
      description: "Specific surveys, reports, data points, or quotes that back the severity ranking."
      detail_level: detailed

    - name: government_policy_driver
      description: "Which current government policy or programme addresses this (Digitising Social Care, 10 Year Health Plan, AI Opportunities Action Plan)."
      detail_level: brief

    - name: competitor_exploitation
      description: "Which competitors already target this pain point in their messaging, and how."
      detail_level: moderate

    - name: content_format_fit
      description: "Best content format to address this on the website — calculator, case study, video, data viz, stat block."
      detail_level: brief

    - name: objection_link
      description: "What objection a care manager raises when told this is solvable (e.g. 'we can't afford it', 'staff won't use it')."
      detail_level: moderate

  # ========================================
  # COMPETITORS (Category B)
  # ========================================
  competitors:
    - name: headline_messaging
      description: "Exact hero text and value proposition from their website."
      detail_level: detailed

    - name: pain_points_targeted
      description: "Which specific problems they lead with in their marketing."
      detail_level: moderate

    - name: cta_format
      description: "Primary call-to-action — wording, format, destination (form, calendar, demo)."
      detail_level: moderate

    - name: social_proof_approach
      description: "How they display trust — stats, client logos, named quotes, community size, certifications."
      detail_level: detailed

    - name: pricing_visibility
      description: "How pricing is handled on-site — visible, 'contact us', freemium, calculator."
      detail_level: brief

    - name: tone
      description: "Overall tone — corporate, warm, technical, clinical, aspirational."
      detail_level: brief

    - name: ai_positioning
      description: "How AI is positioned — core feature, add-on, coming soon, or absent."
      detail_level: moderate

    - name: acquisition_strategy
      description: "Whether acquiring other companies or being acquired. Signals market consolidation."
      detail_level: brief

    - name: market_segment_focus
      description: "Residential care, domiciliary care, supported living, or multi-segment."
      detail_level: brief

    - name: trust_signal_type
      description: "Specific trust signals — ISO 27001, Cyber Essentials, client count, CQC outcome data, B Corp."
      detail_level: moderate

    - name: content_marketing_approach
      description: "Whether they invest in educational content — eBooks, blogs, guides, webinars, reports."
      detail_level: moderate

  # ========================================
  # WORKFLOWS (Category C)
  # ========================================
  workflows:
    - name: current_process
      description: "How this task is done manually today in a typical care home."
      detail_level: moderate

    - name: time_spent
      description: "Estimated hours per week/month spent on this workflow."
      detail_level: moderate

    - name: ai_solution
      description: "What AI specifically does to improve this — draft, review, flag, predict, automate."
      detail_level: detailed

    - name: buyer_language
      description: "How a care manager would describe this task in plain English — no tech jargon."
      detail_level: detailed

    - name: outcome_statement
      description: "Plain-English result for the website — e.g. 'Care plans reviewed in 30 minutes instead of 4 hours.'"
      detail_level: detailed

    - name: regulatory_alignment
      description: "Which CQC quality statement or KLOE this workflow maps to."
      detail_level: moderate

    - name: existing_tech_gap
      description: "What current care software does/doesn't do here, and where AI adds unique value."
      detail_level: moderate

    - name: implementation_complexity
      description: "Plug-and-play, requires integration, or requires process redesign."
      detail_level: brief

    - name: proof_of_concept_availability
      description: "Whether a working demo or case study exists for this AI-automated workflow."
      detail_level: brief

  # ========================================
  # CTA FORMATS (Category D)
  # ========================================
  cta_formats:
    - name: conversion_rate_data
      description: "Published benchmarks — conversion rates, click-through rates, industry data."
      detail_level: detailed

    - name: best_for_audience
      description: "Which buyer type responds best — CEO, manager, frontline, early-stage vs ready-to-buy."
      detail_level: moderate

    - name: friction_level
      description: "Commitment level — low (click), medium (short form), high (long form, calendar)."
      detail_level: brief

    - name: industry_examples
      description: "B2B service companies or care tech companies using this CTA format successfully."
      detail_level: moderate

    - name: care_sector_relevance
      description: "How well this maps to care sector buyer behaviour — time-poor, non-technical, risk-averse."
      detail_level: moderate

    - name: ai_trust_factor
      description: "Whether this CTA helps overcome AI-specific trust deficit (fear of unknown, replacing humans)."
      detail_level: moderate

    - name: funnel_stage
      description: "Where in buyer journey — awareness, consideration, or decision."
      detail_level: brief

    - name: mobile_optimization_priority
      description: "How well this works on mobile — care managers browse on phones during breaks."
      detail_level: brief

  # ========================================
  # STATISTICAL SOURCES (Category E)
  # ========================================
  stats:
    - name: statistic
      description: "The actual number, percentage, or claim."
      detail_level: detailed

    - name: source
      description: "Who published it — organisation name."
      detail_level: detailed

    - name: source_url
      description: "Direct URL to the source document or page."
      detail_level: detailed

    - name: date
      description: "Publication date."
      detail_level: brief

    - name: credibility
      description: "Source type — government, peer-reviewed, consultancy, vendor, media."
      detail_level: brief

    - name: applicability
      description: "Directly care sector, healthcare adjacent, or general AI/productivity."
      detail_level: brief

    - name: citable
      description: "Can it be put on a website with clear attribution? Yes/No + any caveats."
      detail_level: brief

    - name: website_placement
      description: "Where on the website this stat should appear — hero, social proof bar, pain point section, case study."
      detail_level: moderate

    - name: emotional_vs_rational
      description: "Appeals to emotion (burnout, care quality) or rational decision-making (ROI, time, cost)."
      detail_level: brief

    - name: clarica_differentiator
      description: "Whether this stat supports Clarica's specific positioning as AI agency vs software vendor."
      detail_level: moderate

    - name: refresh_frequency
      description: "How often this stat is updated and when next update is expected."
      detail_level: brief

    - name: comparison_pair
      description: "A before/after or sector/benchmark comparison this stat enables."
      detail_level: moderate

uncertain: []
