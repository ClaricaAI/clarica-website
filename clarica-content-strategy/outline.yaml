topic: "Clarica Website Content Strategy — AI Agency for UK Social Care"
date: "2026-03-23"
time_range: "Last 12 months (since March 2025)"

items:

  # A. Pain Points (UK Care Sector)
  - id: A1
    name: "Admin & paperwork overload"
    category: pain_points
    description: "Documentation burden on care staff and managers"

  - id: A2
    name: "Report building"
    category: pain_points
    description: "Time spent compiling reports for management, CQC, local authority"

  - id: A3
    name: "Compliance gaps going unnoticed"
    category: pain_points
    description: "Missed reviews, expired assessments, audit failures"

  - id: A4
    name: "AI education gap"
    category: pain_points
    description: "Workforce doesn't understand what AI can do"

  - id: A5
    name: "Undefined/inconsistent processes"
    category: pain_points
    description: "No standardised workflows across sites"

  - id: A6
    name: "Existing software limitations"
    category: pain_points
    description: "Current systems don't do what's needed"

  - id: A7
    name: "High cost of external software"
    category: pain_points
    description: "Care sector priced out of enterprise tools"

  - id: A8
    name: "Staff inability to use AI"
    category: pain_points
    description: "Tools exist but staff can't/won't use them"

  - id: A9
    name: "Falling behind on AI adoption"
    category: pain_points
    description: "Fear of being left behind as sector modernises"

  - id: A10
    name: "Staff turnover and recruitment crisis"
    category: pain_points
    description: "23.7% turnover, 111k vacancies, visa ban removing international pipeline"

  - id: A11
    name: "Financial pressure and fee shortfalls"
    category: pain_points
    description: "Only 1% of homecare contracts meet minimum price benchmark, £1.6bn funding gap"

  - id: A12
    name: "CQC regulatory uncertainty"
    category: pain_points
    description: "New Single Assessment Framework mid-rollout, providers unsure what 'good' looks like"

  - id: A13
    name: "Connectivity and digital infrastructure gaps"
    category: pain_points
    description: "27% of providers not using care tech, 14% of homes have no connectivity"

  - id: A14
    name: "Burnout and morale among care staff"
    category: pain_points
    description: "20+ hours/week on admin instead of care, 45% say it impacts care quality"

  - id: A15
    name: "Data sharing, interoperability, and cyber security anxiety"
    category: pain_points
    description: "41% cite cyber/data security costs as barrier, MODS mandatory by July 2026"

