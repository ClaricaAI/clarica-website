  # E. Statistical Sources
  - id: E1
    name: "Skills for Care — State of the Sector 2025"
    category: stats
    description: "1.60M filled posts, 23.7% turnover, 111k vacancies"

  - id: E2
    name: "CQC — State of Care 2024/25"
    category: stats
    description: "45% of homes rated RI or Inadequate"

  - id: E3
